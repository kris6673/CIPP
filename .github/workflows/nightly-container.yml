name: "Build: Nightly Container"

on:
  schedule:
    - cron: '0 23 * * *' # 11 PM UTC daily
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Check for recent commits
        id: check
        run: |
          if [ "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "has_commits=true" >> $GITHUB_OUTPUT
          else
            echo "has_commits=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve version from latest release tag
        if: steps.check.outputs.has_commits == 'true' || github.event_name == 'workflow_dispatch'
        id: version
        run: |
          TAG=$(git tag --sort=-v:refname | head -1)
          TAG=${TAG:-v0.0.0}
          BASE="${TAG#v}"
          # Use the checked-out tree's SHA, not github.sha — those diverge when
          # workflow_dispatch is run from a branch other than dev.
          FULL_SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "app_version=${BASE}+nightly.${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_sha=${FULL_SHA}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Set lower case image name
        if: steps.check.outputs.has_commits == 'true' || github.event_name == 'workflow_dispatch'
        run: echo "IMAGE_NAME_LC=${REPO,,}" >> $GITHUB_ENV
        env:
          REPO: ${{ github.repository }}

      - name: Log in to GHCR
        if: steps.check.outputs.has_commits == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        if: steps.check.outputs.has_commits == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      # Persist the Next.js compile cache and yarn cache across runs (BuildKit
      # cache mounts are not exported by type=gha). Shared key prefix and gha
      # scope with the dev workflow — they build the identical Dockerfile/base.
      - name: Restore frontend build caches
        id: build-cache
        if: steps.check.outputs.has_commits == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: |
            yarn-cache
            next-cache
          key: cipp-frontend-cache-dev-${{ github.run_id }}
          restore-keys: |
            cipp-frontend-cache-dev-

      - name: Inject build caches into BuildKit
        if: steps.check.outputs.has_commits == 'true' || github.event_name == 'workflow_dispatch'
        uses: reproducible-containers/buildkit-cache-dance@v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-map: |
            {
              "yarn-cache": "/usr/local/share/.cache/yarn",
              "next-cache": "/build/.next/cache"
            }
          skip-extraction: ${{ steps.build-cache.outputs.cache-hit }}

      - name: Build and push
        if: steps.check.outputs.has_commits == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          push: true
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
            COMMIT_SHA=${{ steps.version.outputs.full_sha }}
            IMAGE_TAG=nightly
            BUILD_DATE=${{ steps.version.outputs.build_date }}
            DOTNET_REGISTRY=${{ vars.DOTNET_REGISTRY || 'ghcr.io/cyberdrain' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:nightly
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=CIPP - Nightly Build
            org.opencontainers.image.revision=${{ steps.version.outputs.full_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}
            org.opencontainers.image.created=${{ steps.version.outputs.build_date }}
