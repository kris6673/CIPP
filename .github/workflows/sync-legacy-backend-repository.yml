name: Sync Backend from CIPP-API

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:
    inputs:
      branch:
        description: 'CIPP-API branch to sync from'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CIPP-NG
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Checkout CIPP-API source
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.CIPP_API_REPO || 'KelvinTegelaar/CIPP-API' }}
          ref: ${{ inputs.branch || 'dev' }}
          path: _source

      - name: Sync backend
        run: |
          # Preserve the subfolder .gitignore
          cp backend/.gitignore /tmp/backend-gitignore 2>/dev/null || true

          # Clear existing backend content
          rm -rf backend/*

          # ── Whitelist: folders to copy ──
          for dir in Config AddChocoApp AddMSPApp ExecMaintenanceScripts Tests Shared; do
            if [ -d "_source/$dir" ]; then
              cp -r "_source/$dir" "backend/$dir"
              echo "  $dir: copied"
            else
              echo "  $dir: not found, skipping"
            fi
          done

          # ── Modules: copy all except excluded ──
          mkdir -p backend/Modules
          for mod in _source/Modules/*/; do
            mod_name=$(basename "$mod")
            case "$mod_name" in
              AzureFunctions.PowerShell.Durable.SDK|CippEntrypoints) echo "  Modules/$mod_name: excluded"; continue ;;
            esac
            cp -r "$mod" "backend/Modules/$mod_name"
            echo "  Modules/$mod_name: copied"
          done

          # ── Whitelist: individual files to copy ──
          for f in cspell.json version_latest.txt; do
            if [ -f "_source/$f" ]; then
              cp "_source/$f" "backend/$f"
              echo "  $f: copied"
            fi
          done

          # Restore .gitignore
          cp /tmp/backend-gitignore backend/.gitignore 2>/dev/null || true

          # Cleanup
          rm -rf _source

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "chore: sync backend from CIPP-API $(date -u +%Y-%m-%d)"
          git push
