name: PR Branch Check

on:
  # Using pull_request_target instead of pull_request for secure handling of fork PRs
  pull_request_target:
    # Only run on these PR events
    types: [opened, synchronize, reopened]
    # Only check PRs targeting these branches
    branches:
      - main
      - master

permissions:
  pull-requests: write
  issues: write

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check and Comment on PR
        # Only process fork PRs with specific branch conditions
        # Must be a fork AND (source is main/master OR target is main/master)
        if: |
          github.event.pull_request.head.repo.fork == true &&
          ((github.event.pull_request.head.ref == 'main' || github.event.pull_request.head.ref == 'master') ||
          (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'master'))
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let message = '';

            if (context.payload.pull_request.base.ref === 'main' || context.payload.pull_request.base.ref === 'master') {
              message += '⚠️ PRs cannot target the main branch directly. Please re-open your PR targeting the `dev` branch.\n\n';
            }

            if (context.payload.pull_request.head.ref === 'main' || context.payload.pull_request.head.ref === 'master') {
              message += '⚠️ PRs cannot originate from your fork\'s main/master branch. Please create a feature branch and re-open the PR from there.\n\n';
            }

            message += '🔒 This PR will now be automatically closed.';

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: message
            });

            await github.rest.pulls.update({
              ...context.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
