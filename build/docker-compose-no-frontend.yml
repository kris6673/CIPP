services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: cipp-azurite
    restart: unless-stopped
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /workspace
      --loose
      --skipApiVersionCheck
      --disableTelemetry
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    environment:
      - AZURITE_ACCOUNTS=devstoreaccount1:Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==
      - NODE_OPTIONS=--max-old-space-size=8192
    volumes:
      - cipp-ng_azurite-data:/workspace
    networks:
      - cipp-network

  cipp-api:
    # Dev loop: runs the plain CRAFT runtime image with the repo's backend/
    # bind-mounted over /app/API. The committed .psm1 stubs dot-source
    # Public/*.ps1, so PS source edits go live with a container restart —
    #
    # The frontend is NOT served from the image in this loop. CRAFT runs in
    # Development mode and proxies all non-API routes to the Next.js dev
    # server on the host
    # then browse everything via http://localhost:5196 (same-origin API).
    image: ghcr.io/cyberdrain/craft:dev
    container_name: cipp-api
    restart: unless-stopped
    ports:
      - "5196:8080"
    # ── B2 sim (Azure App Service Basic B2: 2 vCPU, 3.5 GB) ──
    # Caps total container memory + disables swap so OOM behaves like B2; cpus:2
    # makes .NET report ProcessorCount=2. Comment out for the light dev loop.
    mem_limit: 3584m
    memswap_limit: 3584m
    cpus: 2
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CRAFT_VERBOSE=true
      - App__Setup__Enabled=false
      - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://cipp-azurite:10000/devstoreaccount1;QueueEndpoint=http://cipp-azurite:10001/devstoreaccount1;TableEndpoint=http://cipp-azurite:10002/devstoreaccount1;
      - NonLocalHostAzurite=true
      - CIPPNG=true
      - COMMIT_SHA=-unknown
      # B2 sim: WEBSITE_SKU=Basic + cpus:2 resolve the {Basic,Cpu2} SkuProfile to
      # 6+8=14 runspaces (prod on B2); explicit 6/8 guarantees it. Drop for light dev.
      - WEBSITE_SKU=Basic
      - App__Worker__HttpPoolSize=6
      - App__Worker__BgPoolSize=8
      - App__StatsHistory__SampleIntervalSeconds=10
      # GC overrides for the pulled craft:dev image (the rebuilt image bakes these):
      # Workstation GC + 2 GiB absolute heap cap.
      - DOTNET_gcServer=0
      - DOTNET_GCHeapHardLimit=0x80000000
      # The Next.js dev server runs on the HOST when using for windows dev as bind mounts are too slow for node_modules
      - CRAFT_DEV_FRONTEND_URL=http://host.docker.internal:3000
    volumes:
      - ./config/appsettings.Local.Development.json:/app/appsettings.Development.json:ro
      # Live backend source. rw because runtime permission extraction writes
      # Config/function-permissions.json back into the repo (gitignored).
      - ../backend:/app/API
      # ModuleBuilder-compiled CIPP modules overlay the bind-mounted source: each
      # mount shadows just that module's subdir, so the container imports the fast
      # single-file .psm1 instead of dot-sourcing Public/*.ps1 in every runspace.
      # Built + kept fresh by Watch-Cipp-Dev-Modules.ps1 (run in its own terminal);
      # these dirs MUST exist before `up` or Docker shadows the source with empties.
      # Non-CIPP modules (AzBobbyTables, DNSHealth, ...) and CIPPTests stay from the
      # ../backend mount above.
      - ./.devmodules/CIPPCore:/app/API/Modules/CIPPCore:ro
      - ./.devmodules/CIPPHTTP:/app/API/Modules/CIPPHTTP:ro
      - ./.devmodules/CIPPStandards:/app/API/Modules/CIPPStandards:ro
      - ./.devmodules/CIPPDB:/app/API/Modules/CIPPDB:ro
      - ./.devmodules/CIPPAlerts:/app/API/Modules/CIPPAlerts:ro
      - ./.devmodules/CIPPActivityTriggers:/app/API/Modules/CIPPActivityTriggers:ro
      - ./.devmodules/CippExtensions:/app/API/Modules/CippExtensions:ro
      - ./.devmodules/CIPPTests:/app/API/Modules/CIPPTests:rw
    develop:
      watch:
        # The compiled CIPP* modules are owned by Watch-Cipp-Dev-Modules.ps1, which
        # recompiles + restarts on change — ignore them here to avoid a double restart
        # that races the recompile. Other modules (CIPPTests, pre-built ones) still
        # restart on change via this watch.
        - action: restart
          path: ../backend/Modules
          target: /app/API/Modules
          ignore:
            - CIPPCore/
            - CIPPHTTP/
            - CIPPStandards/
            - CIPPDB/
            - CIPPAlerts/
            - CIPPTests/
            - CIPPActivityTriggers/
            - CippExtensions/
        - action: restart
          path: ../backend/Shared
          target: /app/API/Shared
        - action: restart
          path: ../backend/Config
          target: /app/API/Config
          ignore:
            # container writes this back at startup, would cause a restart loop
            - function-permissions.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - azurite
    networks:
      - cipp-network

volumes:
  cipp-ng_azurite-data:
    external: true

networks:
  cipp-network:
    driver: bridge
