services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: cipp-azurite
    restart: unless-stopped
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /workspace
      --loose
      --skipApiVersionCheck
      --disableTelemetry
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    environment:
      - AZURITE_ACCOUNTS=devstoreaccount1:Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==
      - NODE_OPTIONS=--max-old-space-size=8192
    volumes:
      - cipp-ng_azurite-data:/workspace
    networks:
      - cipp-network

  cipp-api:
    # Dev loop: runs the plain CRAFT runtime image with the repo's backend/
    # bind-mounted over /app/API. The committed .psm1 stubs dot-source
    # Public/*.ps1, so PS source edits go live with a container restart —
    #
    # The frontend is NOT served from the image in this loop. CRAFT runs in
    # Development mode and proxies all non-API routes to the Next.js dev
    # server on the host (CRAFT_DEV_FRONTEND_URL).
    # then browse everything via http://localhost:5196 (same-origin API).
    image: ghcr.io/cyberdrain/craft:dev
    platform: linux/amd64
    container_name: cipp-api
    restart: unless-stopped
    ports:
      - "5196:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CRAFT_VERBOSE=true
      - App__Setup__Enabled=false
      - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - NonLocalHostAzurite=true
      - CIPPNG=true
      - COMMIT_SHA=-unknown
      - App__Worker__HttpPoolSize=3
      - App__Worker__BgPoolSize=8
      - App__StatsHistory__SampleIntervalSeconds=10
      # DEV ONLY: this loop bind-mounts raw backend source whose module manifests declare
      # FunctionsToExport = '*'. PowerShell can't auto-load a wildcard-export module by command
      # name, so background dispatchers (e.g. CIPPDBCache) that probe with Get-Command fail with
      # "function not found" on workers that didn't eagerly import the module. This flag makes
      # Craft expand each wildcard manifest to its explicit Public/*.ps1 function list at startup
      # (idempotent — matches what the production ModuleBuilder build bakes in).
      - App__Worker__DevExpandModuleExports=true
      # Scope expansion to modules NOT eagerly imported into the worker pools (CIPPCore/
      # CIPPActivityTriggers/CIPPHTTP already are, so they don't need it). These are the ones
      # background dispatchers reach by command name and would otherwise fail to auto-load.
      - App__Worker__DevExpandModules__0=CIPPStandards
      - App__Worker__DevExpandModules__1=CIPPAlerts
      - App__Worker__DevExpandModules__2=CIPPTests
      - App__Worker__DevExpandModules__3=CIPPDB
      - App__Worker__DevExpandModules__4=CippExtensions
      - App__Worker__DevExpandModules__5=CIPPActivityTriggers
      # The Next.js dev server runs in a container, if using windows bind mounts are too slow for node_modules
      # you should use the other docker compose file without the frontend container and run the frontend dev server on the host using the start script
      - CRAFT_DEV_FRONTEND_URL=http://cipp-frontend:3000
    volumes:
      - ./config/appsettings.Local.Development.json:/app/appsettings.Development.json:ro
      # Live backend source. rw because runtime permission extraction writes
      # Config/function-permissions.json back into the repo (gitignored).
      - ../backend:/app/API
    develop:
      watch:
        - action: restart
          path: ../backend/Modules
          target: /app/API/Modules
        - action: restart
          path: ../backend/Shared
          target: /app/API/Shared
        - action: restart
          path: ../backend/Config
          target: /app/API/Config
          ignore:
            # container writes this back at startup, would cause a restart loop
            - function-permissions.json
    depends_on:
      - azurite
    networks:
      - cipp-network

  cipp-frontend:
    image: node:22-slim
    platform: linux/amd64
    container_name: cipp-frontend
    restart: unless-stopped
    working_dir: /app
    # npx next dev instead of `yarn run dev`: the repo's dev script binds 127.0.0.1,
    # which is unreachable from the cipp-api container's proxy — bind 0.0.0.0 here.
    command: sh -c "yarn install --network-timeout 500000 && npx next dev -H 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true # Watch for file changes so the dev server reloads when frontend source files change
    volumes:
      - ../frontend:/app
      - cipp-frontend_node_modules:/app/node_modules
      - cipp-frontend_out_dev:/app/out/dev
    depends_on:
      - azurite
    networks:
      - cipp-network

volumes:
  cipp-ng_azurite-data:
    external: true
  cipp-frontend_node_modules:
    external: true
  cipp-frontend_out_dev:
    external: true

networks:
  cipp-network:
    driver: bridge
